spring:
  application:
    name: pgf-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:supabase}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true

supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}

app:
  upload:
    supabase:
      bucket: "oeuvres"
      max-width: 2400
      max-height: 2400
      jpeg-quality: 0.95
      thumbnail-size: 400
  admin:
    password: ${ADMIN_PASSWORD}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

---
spring:
  config:
    activate:
      on-profile: supabase
  datasource:
    url: ${SUPABASE_DATABASE_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: HikariPool-PGF
      data-source-properties:
        prepareThreshold: 0
        sslmode: require
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: ${SUPABASE_DATABASE_URL}
    user: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    jdbc-properties:
      prepareThreshold: 0
      sslmode: require
flyway:
  repair-on-startup: false

logging:
  level:
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.pool.HikariPool: INFO
    org.hibernate.SQL: ${SQL_LOGGING:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: ${SQL_LOGGING:INFO}
    com.pgf: INFO
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: OFF
  pattern:
    console: "%d{dd.MM.yyyy HH:mm:ss} - %msg%n"